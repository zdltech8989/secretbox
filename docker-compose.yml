version: '3.8'
services:
  secretbox:
    build: .
    container_name: secretbox
    restart: unless-stopped
    ports:
      - '9000:9000'
    environment:
      - MASTER_PASSWORD=${MASTER_PASSWORD:-changeme}
      - JWT_SECRET=${JWT_SECRET:-secretbox-jwt-secret-change-me}
      - DATABASE_URL=sqlite+aiosqlite:///./data/secretbox.db
      - DATA_DIR=./data
    volumes:
      - ./data:/app/data

  nginx:
    image: nginx:alpine
    container_name: secretbox-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - secretbox
